name: Coverage Diff

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Checkout main into __base
        uses: actions/checkout@v4
        with:
          ref: main
          path: __base

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies (PR)
        run: |
          cd backend && bun install --frozen-lockfile
          cd ../mcp-server && bun install --frozen-lockfile

      - name: Install dependencies (base)
        run: |
          cd __base/backend && bun install --frozen-lockfile
          cd ../mcp-server && bun install --frozen-lockfile

      - name: Run tests with coverage (PR - backend)
        run: cd backend && bun test --coverage --coverage-reporter=lcov --coverage-dir=../coverage/pr/backend || true

      - name: Run tests with coverage (PR - mcp-server)
        run: cd mcp-server && bun test --coverage --coverage-reporter=lcov --coverage-dir=../coverage/pr/mcp-server || true

      - name: Run tests with coverage (base - backend)
        run: cd __base/backend && bun test --coverage --coverage-reporter=lcov --coverage-dir=../../coverage/base/backend || true

      - name: Run tests with coverage (base - mcp-server)
        run: cd __base/mcp-server && bun test --coverage --coverage-reporter=lcov --coverage-dir=../../coverage/base/mcp-server || true

      - name: Run tests with coverage (PR - scripts)
        run: cd scripts && bun test --coverage --coverage-reporter=lcov --coverage-dir=../coverage/pr/scripts || true

      - name: Run tests with coverage (base - scripts)
        run: cd __base/scripts && bun test --coverage --coverage-reporter=lcov --coverage-dir=../../coverage/base/scripts || true

      - name: Generate coverage diff
        id: diff
        run: |
          REPORT=$(bun run scripts/coverage-diff.ts \
            "backend:coverage/base/backend/lcov.info:coverage/pr/backend/lcov.info" \
            "mcp-server:coverage/base/mcp-server/lcov.info:coverage/pr/mcp-server/lcov.info" \
            "scripts:coverage/base/scripts/lcov.info:coverage/pr/scripts/lcov.info")
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- coverage-diff -->';
            const body = `${marker}\n${process.env.REPORT}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          REPORT: ${{ steps.diff.outputs.report }}
